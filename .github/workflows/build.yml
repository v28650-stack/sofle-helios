name: CI Syntax Smoke Test

on:
  workflow_dispatch:

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Print repo root
        run: |
          echo "PWD: $(pwd)"
          echo "List .github/workflows"
          ls -la .github/workflows || true

      - name: Show current build.yml (if present)
        run: |
          if [ -f .github/workflows/build.yml ]; then
            echo "---- build.yml start ----"
            sed -n '1,200p' .github/workflows/build.yml || true
            echo "---- build.yml end ----"
          else
            echo "build.yml not found"
          fi

      - name: Success marker
        run: echo "Actions YAML parsed and ran successfully"
