name: Validate Workflow

on:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show repo root and workflow file
        run: |
          echo "PWD: $(pwd)"
          echo "List .github/workflows"
          ls -la .github/workflows || true
          echo "Show build.yml (if present)"
          if [ -f .github/workflows/build.yml ]; then
            echo "---- build.yml start ----"
            sed -n '1,200p' .github/workflows/build.yml || true
            echo "---- build.yml end ----"
          else
            echo "build.yml not found"
          fi

      - name: YAML syntax check for build.yml
        run: |
          if [ -f .github/workflows/build.yml ]; then
            python3 - <<'PY'
import sys, yaml
with open('.github/workflows/build.yml') as f:
    try:
        yaml.safe_load(f)
        print('YAML parse: OK')
    except Exception as e:
        print('YAML parse: ERROR')
        print(e)
        sys.exit(2)
PY
          else
            echo "No build.yml to check"
          fi
