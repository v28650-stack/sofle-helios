name: Build Sofle Helios Firmware

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout keymap repo
        uses: actions/checkout@v4

      - name: Clone QMK firmware
        run: |
          git clone --depth 1 https://github.com/qmk/qmk_firmware.git
          cd qmk_firmware
          git submodule update --init --recursive --depth 1

      - name: Install QMK CLI
        run: pip3 install qmk

      - name: Copy keymap into QMK
        run: |
          mkdir -p qmk_firmware/keyboards/sofle/keymaps/helios_mine
          cp keymap.c qmk_firmware/keyboards/sofle/keymaps/helios_mine/
          cp rules.mk qmk_firmware/keyboards/sofle/keymaps/helios_mine/
          cp config.h qmk_firmware/keyboards/sofle/keymaps/helios_mine/
          cp ocean_dream.c qmk_firmware/keyboards/sofle/keymaps/helios_mine/
          cp ocean_dream.h qmk_firmware/keyboards/sofle/keymaps/helios_mine/

      - name: Install build dependencies
        run: |
          cd qmk_firmware
          python3 -m pip install -r requirements.txt
          sudo apt-get install -y gcc-arm-none-eabi

      - name: Build firmware
        run: |
          cd qmk_firmware
          qmk compile -kb sofle
