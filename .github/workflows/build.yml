name: Build Sofle Helios Firmware

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout keymap repo
        uses: actions/checkout@v4

      - name: Install QMK CLI
        run: pip3 install qmk

      - name: Setup QMK
        run: qmk setup -H $GITHUB_WORKSPACE/qmk_firmware --yes

      - name: Copy keymap into QMK
        working-directory: ${{ github.workspace }}/qmk_firmware
        run: |
          mkdir -p keyboards/sofle/keymaps/helios_mine
          cp $GITHUB_WORKSPACE/keymap.c keyboards/sofle/keymaps/helios_mine/
          cp $GITHUB_WORKSPACE/rules.mk keyboards/sofle/keymaps/helios_mine/
          cp $GITHUB_WORKSPACE/config.h keyboards/sofle/keymaps/helios_mine/
          cp $GITHUB_WORKSPACE/ocean_dream.c keyboards/sofle/keymaps/helios_mine/
          cp $GITHUB_WORKSPACE/ocean_dream.h keyboards/sofle/keymaps/helios_mine/
          cp $GITHUB_WORKSPACE/oled_graphics.c keyboards/sofle/keymaps/helios_mine/
          cp $GITHUB_WORKSPACE/oled_graphics.h keyboards/sofle/keymaps/helios_mine/

      - name: Install ARM toolchain
        run: sudo apt-get update && sudo apt-get install -y gcc-arm-none-eabi

      - name: Build firmware
        working-directory: ${{ github.workspace }}/qmk_firmware
        run: |
          qmk compile -kb sofle/rev1 -km helios_mine -e CONVERT_TO=helios

      - name: List build output
        working-directory: ${{ github.workspace }}/qmk_firmware
        run: ls -la .build || true

      - name: Stage artifact
        working-directory: ${{ github.workspace }}/qmk_firmware
        run: |
          mkdir -p $GITHUB_WORKSPACE/artifact
          cp .build/sofle_rev1_helios_mine_helios.uf2 $GITHUB_WORKSPACE/artifact/ || true
          ls -la $GITHUB_WORKSPACE/artifact || true

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: sofle-helios-firmware
          path: artifact/
          if-no-files-found: error
      - name: Verify build outputs
        working-directory: ${{ github.workspace }}/qmk_firmware
        run: |
          echo "PWD: $(pwd)"
          echo "Listing qmk_firmware top-level"
          ls -la ${{ github.workspace }}/qmk_firmware || true
          echo "Listing .build directory"
          ls -la ${{ github.workspace }}/qmk_firmware/.build || true
          echo "UF2 files and sizes"
          for f in ${{ github.workspace }}/qmk_firmware/.build/*uf2; do
            if [ -e "$f" ]; then stat -c "%n %s" "$f"; else echo "no uf2 files found"; fi
          done
          echo "Keymap folder contents"
          ls -la ${{ github.workspace }}/qmk_firmware/keyboards/sofle/keymaps/helios_mine || true
          echo "Show rules.mk and config.h (first 200 lines each)"
          head -n 200 ${{ github.workspace }}/qmk_firmware/keyboards/sofle/keymaps/helios_mine/rules.mk || true
          head -n 200 ${{ github.workspace }}/qmk_firmware/keyboards/sofle/keymaps/helios_mine/config.h || true
