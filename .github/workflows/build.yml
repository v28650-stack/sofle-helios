name: Build Sofle Helios Firmware

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout keymap repo
        uses: actions/checkout@v4

      - name: Install QMK CLI
        run: pip3 install qmk

      - name: Setup QMK
        run: qmk setup -H $HOME/qmk_firmware --yes

      - name: Copy keymap into QMK
        run: |
          mkdir -p $HOME/qmk_firmware/keyboards/sofle/keymaps/helios_mine
          cp keymap.c $HOME/qmk_firmware/keyboards/sofle/keymaps/helios_mine/
          cp rules.mk $HOME/qmk_firmware/keyboards/sofle/keymaps/helios_mine/
          cp config.h $HOME/qmk_firmware/keyboards/sofle/keymaps/helios_mine/
          cp ocean_dream.c $HOME/qmk_firmware/keyboards/sofle/keymaps/helios_mine/
          cp ocean_dream.h $HOME/qmk_firmware/keyboards/sofle/keymaps/helios_mine/

      - name: Install ARM toolchain
        run: sudo apt-get install -y gcc-arm-none-eabi

      - name: Build firmware
        run: qmk compile -kb sofle/rev1 -km helios_mine -e CONVERT_TO=helios

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: sofle-helios-firmware
          path: $HOME/qmk_firmware/.build/*.uf2
          if-no-files-found: warn
