name: Build Sofle Helios Firmware

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout keymap repo
        uses: actions/checkout@v4

      - name: Install QMK CLI
        run: pip3 install qmk

      - name: Setup QMK
        run: qmk setup -H ${{ env.HOME }}/qmk_firmware --yes

      - name: Copy keymap into QMK
        working-directory: ${{ env.HOME }}/qmk_firmware
        run: |
          mkdir -p keyboards/sofle/keymaps/helios_m
